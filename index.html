<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coach Reconciliation Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:     #1a1a2e;
      --slate:    #263238;
      --mid:      #37474f;
      --bg:       #f0f2f5;
      --white:    #ffffff;
      --green:    #2e7d32;
      --green-bg: #e8f5e9;
      --red:      #c62828;
      --red-bg:   #ffebee;
      --amber:    #e65100;
      --border:   #e0e0e0;
      --text:     #1a1a2e;
      --muted:    #546e7a;
      --radius:   8px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── HEADER ── */
    header {
      background: var(--navy);
      color: #fff;
      padding: 18px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }
    header h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.3px; }
    .header-meta { font-size: 12px; opacity: 0.65; }
    .header-right { display: flex; align-items: center; gap: 16px; }

    .settings-btn {
      background: rgba(255,255,255,.12);
      border: 1px solid rgba(255,255,255,.22);
      color: #fff;
      padding: 6px 14px;
      border-radius: 16px;
      font-size: 12px;
      cursor: pointer;
      transition: background .15s;
      white-space: nowrap;
    }
    .settings-btn:hover { background: rgba(255,255,255,.22); }

    /* ── MODAL ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.45);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    .modal-box {
      background: var(--white);
      border-radius: 12px;
      padding: 28px 32px;
      width: 400px;
      box-shadow: 0 12px 40px rgba(0,0,0,.22);
    }
    .modal-box h3 { font-size: 17px; font-weight: 700; margin-bottom: 6px; }
    .modal-box p  { font-size: 13px; color: var(--muted); margin-bottom: 20px; line-height: 1.5; }
    .modal-box label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .5px;
      color: var(--muted);
      margin-bottom: 4px;
    }
    .modal-box label + label, .modal-lbl-gap { margin-top: 14px; }
    .modal-box input {
      width: 100%;
      padding: 9px 12px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 13px;
      outline: none;
      transition: border-color .15s;
    }
    .modal-box input:focus { border-color: var(--navy); }
    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 22px;
    }
    .modal-actions button {
      padding: 8px 20px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid var(--border);
      background: var(--white);
      color: var(--text);
      transition: background .15s;
    }
    .modal-actions button:hover { background: #f5f5f5; }
    .btn-primary {
      background: var(--navy) !important;
      color: #fff !important;
      border-color: var(--navy) !important;
    }
    .btn-primary:hover { background: #263170 !important; }

    /* ── SUMMARY STRIP ── */
    .summary {
      background: var(--white);
      border-bottom: 1px solid var(--border);
      padding: 14px 32px;
      display: flex;
      gap: 32px;
      align-items: center;
      flex-wrap: wrap;
    }
    .stat { text-align: center; min-width: 70px; }
    .stat .val { font-size: 26px; font-weight: 800; line-height: 1; }
    .stat .lbl { font-size: 10px; text-transform: uppercase; letter-spacing: 0.6px; color: var(--muted); margin-top: 2px; }
    .stat.green .val { color: var(--green); }
    .stat.red   .val { color: var(--red); }
    .stat.rate  .val { color: var(--navy); }
    .summary-divider { width: 1px; height: 40px; background: var(--border); }

    /* ── BANNER ── */
    .banner { padding: 10px 32px; font-size: 12px; display: none; }
    .banner.error   { background: var(--red-bg); color: var(--red); border-bottom: 1px solid #ef9a9a; }
    .banner.warning { background: #fff3e0; color: var(--amber); border-bottom: 1px solid #ffe0b2; }

    /* ── MAIN TABLE ── */
    .container { padding: 24px 32px; }

    .table-wrap {
      background: var(--white);
      border-radius: var(--radius);
      box-shadow: 0 1px 6px rgba(0,0,0,.07);
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 900px;
    }

    thead th {
      background: var(--slate);
      color: #fff;
      padding: 10px 14px;
      font-size: 11px;
      font-weight: 500;
      white-space: nowrap;
      text-align: center;
      border-right: 1px solid rgba(255,255,255,.08);
    }
    thead th.left { text-align: left; }
    thead tr.sub th {
      background: var(--mid);
      font-size: 10px;
      color: #b0bec5;
      padding: 5px 10px;
      letter-spacing: 0.3px;
    }

    /* Category rows */
    tbody tr.cat {
      background: #eceff1;
      cursor: pointer;
      user-select: none;
    }
    tbody tr.cat:hover { background: #dde3e7; }
    tbody tr.cat td {
      padding: 11px 16px;
      font-weight: 700;
      font-size: 14px;
      border-bottom: 2px solid var(--border);
    }
    tbody tr.cat .arrow {
      display: inline-block;
      margin-right: 8px;
      transition: transform .2s;
      font-style: normal;
    }
    tbody tr.cat.open .arrow { transform: rotate(90deg); }

    /* Session rows */
    tbody tr.sess { border-bottom: 1px solid #f5f5f5; }
    tbody tr.sess:hover { background: #fafafa; }
    tbody tr.sess td { padding: 8px 12px; font-size: 13px; vertical-align: middle; }
    tbody tr.sess td.name  { padding-left: 36px; }
    tbody tr.sess td.coach { font-size: 11px; color: var(--muted); font-style: italic; }
    tbody tr.sess td.num   { text-align: center; font-size: 13px; font-weight: 600; min-width: 40px; }

    .sub-coach { display: block; font-size: 10px; color: var(--muted); font-style: normal; margin-top: 2px; }
    .sub-coach strong { font-weight: 600; color: var(--text); }

    .hidden { display: none !important; }

    .badge {
      display: inline-block;
      border-radius: 10px;
      padding: 2px 8px;
      font-size: 11px;
      font-weight: 500;
      margin-left: 6px;
      vertical-align: middle;
    }
    .badge.gray { background: var(--muted); color: #fff; }
    .badge.ok   { background: var(--green); color: #fff; }
    .badge.mid  { background: #e65100;      color: #fff; }
    .badge.warn { background: var(--red);   color: #fff; }

    .empty { text-align: center; padding: 64px 32px; color: var(--muted); font-size: 14px; }

    /* ── TERM TABLE ── */
    .term-table th.wk-hdr { min-width: 54px; text-align: center; }

    .wk-cell {
      text-align: center;
      vertical-align: middle;
      padding: 5px 6px !important;
      min-width: 54px;
    }
    .tick-item {
      display: inline-block;
      font-size: 11px;
      font-weight: 700;
      padding: 2px 4px;
      border-radius: 4px;
      margin: 1px;
      cursor: default;
      white-space: nowrap;
      line-height: 1.4;
    }
    .tick-item.yes { background: var(--green-bg); color: var(--green); }
    .tick-item.no  { background: var(--red-bg);   color: var(--red); }
    .wk-cell.empty { color: #e0e0e0; font-size: 18px; }

    .total-cell {
      text-align: center;
      font-weight: 700;
      font-size: 13px;
      white-space: nowrap;
      min-width: 64px;
      padding: 8px 10px !important;
    }
    .total-cell small { display: block; font-weight: 400; font-size: 10px; margin-top: 1px; }
    .total-cell.good { background: var(--green-bg); color: var(--green); }
    .total-cell.mid  { background: #fff8e1; color: #e65100; }
    .total-cell.bad  { background: var(--red-bg); color: var(--red); }

    /* ── COMMENTS ── */
    .comment-col { min-width: 200px; padding: 6px 10px !important; }
    .comment-cell {
      width: 100%;
      min-height: 42px;
      padding: 6px 8px;
      border: 1px solid transparent;
      border-radius: 4px;
      font-size: 12px;
      font-family: inherit;
      color: var(--text);
      resize: vertical;
      background: transparent;
      transition: border-color .15s, background .15s;
      line-height: 1.45;
    }
    .comment-cell:hover  { border-color: var(--border); background: #fafafa; }
    .comment-cell:focus  { border-color: var(--navy); background: var(--white); outline: none; }
    .comment-cell:disabled { color: #bdbdbd; cursor: not-allowed; font-style: italic; }
    .comment-cell::placeholder { color: #bdbdbd; }
  </style>
</head>
<body>

<header>
  <div>
    <h1>Coach Reconciliation Dashboard</h1>
    <div class="header-meta" id="date-range">—</div>
  </div>
  <div class="header-right">
    <button class="settings-btn" onclick="openSettings()">⚙ Comments</button>
    <div class="header-meta" id="gen-at"></div>
  </div>
</header>

<!-- Settings modal -->
<div id="settings-overlay" class="modal-overlay hidden" onclick="closeIfOverlay(event)">
  <div class="modal-box">
    <h3>Comments Settings</h3>
    <p>
      Comments are stored in <strong>JSONBin.io</strong> and shared across
      your team. Create a free account at jsonbin.io, create a new bin, and
      paste your credentials below.
    </p>
    <label>Bin ID</label>
    <input id="inp-bin-id" type="text" placeholder="64abc...xyz" autocomplete="off" />
    <div class="modal-lbl-gap"></div>
    <label>Master Key <span style="font-weight:400;font-size:10px">(starts with $2b$)</span></label>
    <input id="inp-bin-key" type="password" placeholder="$2b$10$…" autocomplete="off" />
    <div class="modal-actions">
      <button onclick="closeSettings()">Cancel</button>
      <button class="btn-primary" onclick="saveSettings()">Save</button>
    </div>
  </div>
</div>

<div id="error-banner" class="banner error"></div>
<div id="warn-banner"  class="banner warning"></div>

<div class="summary" id="summary">
  <div class="stat">       <div class="val" id="s-total">—</div><div class="lbl">Sessions (term)</div></div>
  <div class="summary-divider"></div>
  <div class="stat green"> <div class="val" id="s-asig">—</div> <div class="lbl">Assigned coach</div></div>
  <div class="stat red">   <div class="val" id="s-otro">—</div> <div class="lbl">Different coach</div></div>
  <div class="summary-divider"></div>
  <div class="stat rate">  <div class="val" id="s-rate">—</div> <div class="lbl">Match rate</div></div>
</div>

<div class="container">
  <div class="table-wrap" id="term-table-wrap">
    <div class="empty">Loading…</div>
  </div>
</div>

<script>
// ── JSONBIN CONFIG ────────────────────────────────────────────────────────────
const JSONBIN_BASE = "https://api.jsonbin.io/v3/b";
const getBinId  = () => localStorage.getItem("jb_id")  || "";
const getBinKey = () => localStorage.getItem("jb_key") || "";

// ── COMMENTS ─────────────────────────────────────────────────────────────────
let comments = {};

async function loadComments() {
  const id = getBinId();
  if (!id) return;
  try {
    const headers = {};
    const key = getBinKey();
    if (key) headers["X-Master-Key"] = key;
    const r = await fetch(`${JSONBIN_BASE}/${id}/latest`, { headers });
    if (!r.ok) { console.warn("JSONBin read failed:", r.status); return; }
    const data = await r.json();
    comments = data.record || {};
  } catch(e) { console.warn("Could not load comments:", e.message); }
}

async function saveComment(teamKey, text) {
  if (text === (comments[teamKey] || "")) return; // no change
  comments[teamKey] = text;
  // Persist locally always (fast fallback)
  localStorage.setItem("comments_local", JSON.stringify(comments));
  const id  = getBinId();
  const key = getBinKey();
  if (!id || !key) return;
  try {
    await fetch(`${JSONBIN_BASE}/${id}`, {
      method: "PUT",
      headers: { "Content-Type": "application/json", "X-Master-Key": key },
      body: JSON.stringify(comments),
    });
  } catch(e) { console.warn("Could not save comment:", e.message); }
}

function fillCommentCells() {
  // Prefer JSONBin data; fall back to local cache
  const local = JSON.parse(localStorage.getItem("comments_local") || "{}");
  const merged = Object.assign({}, local, comments);
  document.querySelectorAll(".comment-cell[data-team]").forEach(el => {
    el.value = merged[el.dataset.team] || "";
    // Enable/disable based on whether bin is configured
    el.disabled = getBinId() === "";
    el.placeholder = getBinId() ? "Add a comment…" : "Configure ⚙ to enable comments";
  });
}

// ── SETTINGS MODAL ───────────────────────────────────────────────────────────
function openSettings() {
  document.getElementById("inp-bin-id").value  = getBinId();
  document.getElementById("inp-bin-key").value = getBinKey();
  document.getElementById("settings-overlay").classList.remove("hidden");
}
function closeSettings() {
  document.getElementById("settings-overlay").classList.add("hidden");
}
function closeIfOverlay(e) {
  if (e.target.id === "settings-overlay") closeSettings();
}
function saveSettings() {
  localStorage.setItem("jb_id",  document.getElementById("inp-bin-id").value.trim());
  localStorage.setItem("jb_key", document.getElementById("inp-bin-key").value.trim());
  closeSettings();
  loadComments().then(fillCommentCells);
}

// ── HELPERS ───────────────────────────────────────────────────────────────────
function show(id, msg) {
  const el = document.getElementById(id);
  if (el) { el.textContent = msg; el.style.display = "block"; }
}

function toggle(cid, catRow) {
  const rows = document.querySelectorAll(`tr.${cid}`);
  const open = catRow.classList.contains("open");
  catRow.classList.toggle("open", !open);
  rows.forEach(r => r.classList.toggle("hidden", open));
}

// ── DATA LOADING ──────────────────────────────────────────────────────────────
async function loadTermData() {
  try {
    const r = await fetch("data/term_output.json");
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    return await r.json();
  } catch(e) {
    document.getElementById("term-table-wrap").innerHTML =
      `<div class="empty">No term data available. Run process.py to generate it.</div>`;
    return null;
  }
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function renderTerm(data) {
  if (!data) return;
  const weeks = data.weeks || [];

  // Summary bar from term totals
  let totA = 0, totO = 0;
  for (const cat of data.categories) {
    for (const s of cat.sessions) {
      totA += s.total_assigned   || 0;
      totO += (s.total_sessions - s.total_assigned) || 0;
    }
  }
  const tot = totA + totO;
  document.getElementById("s-total").textContent = tot;
  document.getElementById("s-asig").textContent  = totA;
  document.getElementById("s-otro").textContent  = totO;
  document.getElementById("s-rate").textContent  = tot > 0 ? (100 * totA / tot).toFixed(1) + "%" : "—";
  document.getElementById("date-range").textContent =
    `${data.term.from}  →  ${data.term.to}`;
  document.getElementById("gen-at").textContent =
    "Generated: " + new Date(data.generated_at).toLocaleString();

  // colspan = 2 (team+coach) + 12 weeks + 1 (total) + 1 (comments) = 16
  const COLS = 2 + weeks.length + 2;

  let html = `<table class="term-table">
    <thead>
      <tr>
        <th class="left" rowspan="2" style="min-width:220px">Session / Team</th>
        <th class="left" rowspan="2" style="min-width:170px">Reference Coach</th>
        ${weeks.map(w => `<th class="wk-hdr">${w.label}</th>`).join("")}
        <th rowspan="2" style="min-width:68px">Total</th>
        <th class="left" rowspan="2" style="min-width:220px">Comments</th>
      </tr>
      <tr class="sub">
        ${weeks.map(w => `<th style="font-size:9px;padding:3px 4px">${w.dates}</th>`).join("")}
      </tr>
    </thead>
    <tbody>`;

  for (const cat of data.categories) {
    const cid   = `tc_${cat.name}`;
    const nSess = cat.sessions.length;

    let catA = 0, catT = 0;
    for (const s of cat.sessions) { catA += s.total_assigned || 0; catT += s.total_sessions || 0; }
    const mp      = catT > 0 ? Math.round(100 * catA / catT) : 0;
    const mpClass = mp >= 80 ? "ok" : mp >= 50 ? "mid" : "warn";

    html += `<tr class="cat" onclick="toggle('${cid}', this)">
      <td colspan="${COLS}">
        <i class="arrow">▶</i>
        ${cat.name}
        <span class="badge gray">${nSess} teams</span>
        <span class="badge ${mpClass}">${mp}% match</span>
      </td>
    </tr>`;

    if (nSess === 0) {
      html += `<tr class="sess ${cid} hidden">
        <td colspan="${COLS}" style="text-align:center;color:#aaa;font-size:12px;padding:12px">
          No data for this term
        </td>
      </tr>`;
    }

    for (const sess of cat.sessions) {
      const weekCells = (sess.by_week || []).map(weekSessions => {
        if (!weekSessions || weekSessions.length === 0) {
          return `<td class="wk-cell empty">·</td>`;
        }
        const items = weekSessions.map(s => {
          const cls  = s.assigned ? "yes" : "no";
          const icon = s.assigned ? "✓" : "✗";
          const tip  = s.actual_coach ? ` title="${s.actual_coach}"` : "";
          return `<span class="tick-item ${cls}"${tip}>${s.day}${icon}</span>`;
        }).join("");
        return `<td class="wk-cell">${items}</td>`;
      }).join("");

      const totSess     = sess.total_sessions || 0;
      const totAssigned = sess.total_assigned  || 0;
      const rate        = totSess > 0 ? Math.round(100 * totAssigned / totSess) : 0;
      const rateClass   = rate >= 80 ? "good" : rate >= 50 ? "mid" : "bad";

      const subs = (sess.top_substitutes || []).map(s =>
        `<span class="sub-coach">↪ <strong>${s.coach_name}</strong> ${s.pct}%</span>`
      ).join("");

      // Escape team name for data attribute
      const safeKey = sess.team.replace(/"/g, "&quot;");

      html += `<tr class="sess ${cid} hidden">
        <td class="name">${sess.team}</td>
        <td class="coach">${sess.ref_coach_name || "—"}${subs}</td>
        ${weekCells}
        <td class="num total-cell ${rateClass}">${totAssigned}/${totSess}<small>${rate}%</small></td>
        <td class="comment-col">
          <textarea class="comment-cell" data-team="${safeKey}"
            placeholder="Configure ⚙ to enable comments" disabled
            onblur="saveComment(this.dataset.team, this.value)"
          ></textarea>
        </td>
      </tr>`;
    }
  }

  html += "</tbody></table>";
  document.getElementById("term-table-wrap").innerHTML = html;
  fillCommentCells();
}

// ── BOOT ─────────────────────────────────────────────────────────────────────
Promise.all([loadTermData(), loadComments()])
  .then(([termData]) => {
    if (termData) renderTerm(termData);
  })
  .catch(err => {
    show("error-banner", "Dashboard error: " + err.message);
    console.error(err);
  });
</script>
</body>
</html>
