<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Academy Coach Monitor</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:     #1a1a2e;
      --slate:    #263238;
      --mid:      #37474f;
      --bg:       #f0f2f5;
      --white:    #ffffff;
      --green:    #2e7d32;
      --green-bg: #e8f5e9;
      --red:      #c62828;
      --red-bg:   #ffebee;
      --amber:    #e65100;
      --border:   #e0e0e0;
      --text:     #1a1a2e;
      --muted:    #546e7a;
      --radius:   8px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── HEADER ── */
    header {
      background: var(--navy);
      color: #fff;
      padding: 14px 32px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .header-main {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }
    header h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.3px; }
    .header-meta { font-size: 12px; opacity: 0.65; }
    .header-right { display: flex; align-items: center; gap: 16px; }
    .term-row { display: flex; }

    /* ── TABS ── */
    .tab-nav {
      display: flex;
      gap: 4px;
      background: rgba(255,255,255,.1);
      border-radius: 8px;
      padding: 4px;
    }
    .tab-btn {
      padding: 6px 18px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      background: transparent;
      color: rgba(255,255,255,.6);
      transition: background .15s, color .15s;
      letter-spacing: .2px;
    }
    .tab-btn:hover  { color: #fff; background: rgba(255,255,255,.12); }
    .tab-btn.active { background: #fff; color: var(--navy); }

    /* ── MODAL ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.45);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    .modal-box {
      background: var(--white);
      border-radius: 12px;
      padding: 28px 32px;
      width: 400px;
      box-shadow: 0 12px 40px rgba(0,0,0,.22);
    }
    .modal-box h3 { font-size: 17px; font-weight: 700; margin-bottom: 6px; }
    .modal-box p  { font-size: 13px; color: var(--muted); margin-bottom: 20px; line-height: 1.5; }
    .modal-box label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .5px;
      color: var(--muted);
      margin-bottom: 4px;
    }
    .modal-box label + label, .modal-lbl-gap { margin-top: 14px; }
    .modal-box input {
      width: 100%;
      padding: 9px 12px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 13px;
      outline: none;
      transition: border-color .15s;
    }
    .modal-box input:focus { border-color: var(--navy); }
    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 22px;
    }
    .modal-actions button {
      padding: 8px 20px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid var(--border);
      background: var(--white);
      color: var(--text);
      transition: background .15s;
    }
    .modal-actions button:hover { background: #f5f5f5; }
    .btn-primary {
      background: var(--navy) !important;
      color: #fff !important;
      border-color: var(--navy) !important;
    }
    .btn-primary:hover { background: #263170 !important; }

    /* ── SUMMARY STRIP ── */
    .summary {
      background: var(--white);
      border-bottom: 1px solid var(--border);
      padding: 14px 32px;
      display: flex;
      gap: 32px;
      align-items: center;
      flex-wrap: wrap;
    }
    .stat { text-align: center; min-width: 70px; }
    .stat .val { font-size: 26px; font-weight: 800; line-height: 1; }
    .stat .lbl { font-size: 10px; text-transform: uppercase; letter-spacing: 0.6px; color: var(--muted); margin-top: 2px; }
    .stat.green .val { color: var(--green); }
    .stat.red   .val { color: var(--red); }
    .stat.rate  .val { color: var(--navy); }
    .summary-divider { width: 1px; height: 40px; background: var(--border); }

    /* ── BANNER ── */
    .banner { padding: 10px 32px; font-size: 12px; display: none; }
    .banner.error   { background: var(--red-bg); color: var(--red); border-bottom: 1px solid #ef9a9a; }
    .banner.warning { background: #fff3e0; color: var(--amber); border-bottom: 1px solid #ffe0b2; }

    /* ── MAIN TABLE ── */
    .container { padding: 24px 32px; }

    .table-wrap {
      background: var(--white);
      border-radius: var(--radius);
      box-shadow: 0 1px 6px rgba(0,0,0,.07);
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 900px;
    }

    thead th {
      background: var(--slate);
      color: #fff;
      padding: 10px 14px;
      font-size: 11px;
      font-weight: 500;
      white-space: nowrap;
      text-align: center;
      border-right: 1px solid rgba(255,255,255,.08);
    }
    thead th.left { text-align: left; }
    thead tr.sub th {
      background: var(--mid);
      font-size: 10px;
      color: #b0bec5;
      padding: 5px 10px;
      letter-spacing: 0.3px;
    }

    /* Category rows */
    tbody tr.cat {
      background: #eceff1;
      cursor: pointer;
      user-select: none;
    }
    tbody tr.cat:hover { background: #dde3e7; }
    tbody tr.cat td {
      padding: 11px 16px;
      font-weight: 700;
      font-size: 14px;
      border-bottom: 2px solid var(--border);
    }
    tbody tr.cat .arrow {
      display: inline-block;
      margin-right: 8px;
      transition: transform .2s;
      font-style: normal;
    }
    tbody tr.cat.open .arrow { transform: rotate(90deg); }

    /* Session rows */
    tbody tr.sess { border-bottom: 1px solid #f5f5f5; }
    tbody tr.sess:hover { background: #fafafa; }
    tbody tr.sess td { padding: 8px 12px; font-size: 13px; vertical-align: middle; }
    tbody tr.sess td.name  { padding-left: 36px; }
    tbody tr.sess td.coach { font-size: 11px; color: var(--muted); font-style: italic; }
    tbody tr.sess td.num   { text-align: center; font-size: 13px; font-weight: 600; min-width: 40px; }

    .sub-coach { display: block; font-size: 10px; color: var(--muted); font-style: normal; margin-top: 2px; }
    .sub-coach strong { font-weight: 600; color: var(--text); }

    .hidden { display: none !important; }

    .badge {
      display: inline-block;
      border-radius: 10px;
      padding: 2px 8px;
      font-size: 11px;
      font-weight: 500;
      margin-left: 6px;
      vertical-align: middle;
    }
    .badge.gray { background: var(--muted); color: #fff; }
    .badge.ok   { background: var(--green); color: #fff; }
    .badge.mid  { background: #e65100;      color: #fff; }
    .badge.warn { background: var(--red);   color: #fff; }

    .empty { text-align: center; padding: 64px 32px; color: var(--muted); font-size: 14px; }

    /* ── TERM TABLE ── */
    .term-table th.wk-hdr { min-width: 54px; text-align: center; }

    .wk-cell {
      text-align: center;
      vertical-align: middle;
      padding: 5px 6px !important;
      min-width: 54px;
    }
    .tick-item {
      display: inline-block;
      font-size: 11px;
      font-weight: 700;
      padding: 2px 4px;
      border-radius: 4px;
      margin: 1px;
      cursor: default;
      white-space: nowrap;
      line-height: 1.4;
    }
    .tick-item.yes { background: var(--green-bg); color: var(--green); }
    .tick-item.no  { background: var(--red-bg);   color: var(--red); }
    .wk-cell.empty { color: #e0e0e0; font-size: 18px; }

    .total-cell {
      text-align: center;
      font-weight: 700;
      font-size: 13px;
      white-space: nowrap;
      min-width: 64px;
      padding: 8px 10px !important;
    }
    .total-cell small { display: block; font-weight: 400; font-size: 10px; margin-top: 1px; }
    .total-cell.good { background: var(--green-bg); color: var(--green); }
    .total-cell.mid  { background: #fff8e1; color: #e65100; }
    .total-cell.bad  { background: var(--red-bg); color: var(--red); }

    /* ── STATUS BADGE ── */
    .status-badge {
      display: inline-block;
      border-radius: 4px;
      padding: 2px 7px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.4px;
      vertical-align: middle;
      margin-right: 6px;
      text-transform: uppercase;
    }
    .status-badge.active { background: #2e7d32; color: #fff; }
    .status-badge.former { background: #c62828; color: #fff; }

    /* ── COMMENTS ── */
    .comment-col { min-width: 200px; padding: 6px 10px !important; }
    .comment-cell {
      width: 100%;
      min-height: 42px;
      padding: 6px 8px;
      border: 1px solid transparent;
      border-radius: 4px;
      font-size: 12px;
      font-family: inherit;
      color: var(--text);
      resize: vertical;
      background: transparent;
      transition: border-color .15s, background .15s;
      line-height: 1.45;
    }
    .comment-cell:hover  { border-color: var(--border); background: #fafafa; }
    .comment-cell:focus  { border-color: var(--navy); background: var(--white); outline: none; }
    .comment-cell:disabled { color: #bdbdbd; cursor: not-allowed; font-style: italic; }
    .comment-cell::placeholder { color: #bdbdbd; }

    .ref-badge {
      display: inline-block;
      border-radius: 3px;
      padding: 1px 5px;
      font-size: 9px;
      font-weight: 700;
      background: var(--navy);
      color: #fff;
      letter-spacing: 0.5px;
      vertical-align: middle;
      margin-left: 3px;
    }

    tbody tr.sess.team-first { border-top: 2px solid var(--border); }
    tbody tr.sess td.coach-cell { font-size: 12px; min-width: 150px; padding: 6px 10px !important; }
    tbody tr.sess td.name { vertical-align: top; padding-top: 10px !important; }
    td.comment-col { vertical-align: top !important; }
    .coach-comment-row td { padding: 4px 12px 6px !important; background: #f5f7fa; border-bottom: 1px solid #e0e0e0; }
    .coach-comment-row .comment-cell { min-height: 36px; }

    /* ── STICKY HEADER (freeze date row on vertical scroll) ── */
    thead {
      position: sticky;
      top: 0;
      z-index: 3;
    }
    /* Corner cells (sticky left + sticky top) need the highest z-index */
    thead th[style*="left:"] { z-index: 4 !important; }
    /* Make both table wrappers scroll vertically so the sticky thead anchors correctly */
    #term-table-wrap    { max-height: calc(100vh - 180px); overflow-y: auto; }
    #coaches-table-wrap { max-height: calc(100vh - 180px); overflow-y: auto; }

    /* ── CATEGORY HEADER BADGES ── */
    .cat-badge {
      display: inline-block;
      border-radius: 4px;
      padding: 2px 7px;
      font-size: 10px;
      font-weight: 600;
      margin-left: 8px;
      vertical-align: middle;
      letter-spacing: .2px;
    }
    .cat-badge.gray { background: #cfd8dc; color: #37474f; }
    .cat-badge.ok   { background: #c8e6c9; color: #1b5e20; }
    .cat-badge.mid  { background: #fff3e0; color: #e65100; }
    .cat-badge.bad  { background: #ffcdd2; color: #b71c1c; }

    /* ── COACHES TABLE ── */
    .coaches-table th.dt-hdr {
      min-width: 40px;
      max-width: 48px;
      text-align: center;
      padding: 8px 4px;
      font-size: 10px;
    }
    .coaches-table .wk-cell {
      min-width: 40px;
      max-width: 48px;
      padding: 4px 3px !important;
    }
    /* ── WHATSAPP BUTTON ── */
    .wa-btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 10px 3px 8px;
      border-radius: 5px;
      font-size: 11px;
      font-weight: 600;
      background: #25D366;
      color: #fff;
      border: none;
      cursor: pointer;
      text-decoration: none;
      margin-left: 10px;
      vertical-align: middle;
      line-height: 1.4;
    }
    .wa-btn:hover { background: #128C7E; color: #fff; }
    .wa-btn svg { width: 13px; height: 13px; fill: #fff; flex-shrink: 0; }

    /* Coach-name header rows use same .cat style */
    .coaches-table tbody tr.cat td {
      padding: 9px 16px;
      font-size: 13px;
    }
    /* Team sub-rows: name column shows team label */
    .coaches-table tbody tr.sess td.team-cell {
      font-size: 11px;
      padding-left: 32px;
      min-width: 220px;
      max-width: 300px;
      word-break: break-word;
    }

    /* ── EXECUTIVE SUMMARY ── */
    #exec-summary {
      background: var(--white);
      border-bottom: 1px solid var(--border);
    }
    .exec-header {
      padding: 10px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      user-select: none;
      border-bottom: 1px solid transparent;
    }
    .exec-header:hover { background: #f8f9fa; }
    .exec-header.open { border-bottom-color: var(--border); }
    .exec-title { font-size: 13px; font-weight: 700; color: var(--navy); }
    .exec-toggle { font-size: 11px; color: var(--muted); }
    .exec-body {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      padding: 16px 32px;
    }
    .exec-body.hidden { display: none; }
    .exec-card {
      padding: 0 20px 0 0;
      margin: 0 20px 0 0;
      border-right: 1px solid var(--border);
    }
    .exec-card:last-child { border-right: none; margin-right: 0; padding-right: 0; }
    .exec-card-title {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      margin-bottom: 10px;
      padding-bottom: 6px;
      border-bottom: 2px solid currentColor;
    }
    .exec-card-title.ok    { color: var(--green); }
    .exec-card-title.warn  { color: var(--red); }
    .exec-card-title.navy  { color: var(--navy); }
    .exec-card-title.amber { color: var(--amber); }
    .exec-item {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 8px;
      min-width: 0;
    }
    .exec-item-info { flex: 1; min-width: 0; }
    .exec-item-name {
      font-size: 12px;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .exec-item-sub {
      font-size: 10px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .exec-pct {
      font-size: 11px;
      font-weight: 700;
      white-space: nowrap;
      padding: 2px 7px;
      border-radius: 4px;
      flex-shrink: 0;
    }
    .exec-pct.ok   { background: var(--green-bg); color: var(--green); }
    .exec-pct.mid  { background: #fff8e1; color: #e65100; }
    .exec-pct.bad  { background: var(--red-bg); color: var(--red); }
    .exec-empty { font-size: 12px; color: var(--muted); font-style: italic; }
  </style>
</head>
<body>

<header>
  <div class="term-row">
    <div class="tab-nav" id="term-nav"></div>
  </div>
  <div class="header-main">
    <div>
      <h1 id="page-title">Academy Coach Monitor</h1>
      <div class="header-meta" id="date-range">—</div>
    </div>
    <div class="header-right">
      <div class="tab-nav">
        <button class="tab-btn active" data-tab="sessions" onclick="switchTab('sessions')">Sessions</button>
        <button class="tab-btn"        data-tab="coaches"  onclick="switchTab('coaches')">Coaches</button>
      </div>
      <div class="header-meta" id="gen-at"></div>
    </div>
  </div>
</header>

<div id="error-banner" class="banner error"></div>
<div id="warn-banner"  class="banner warning"></div>

<div class="summary" id="summary">
  <div class="stat">       <div class="val" id="s-total">—</div><div class="lbl">Sessions (term)</div></div>
  <div class="summary-divider"></div>
  <div class="stat green"> <div class="val" id="s-asig">—</div> <div class="lbl">Assigned coach</div></div>
  <div class="stat red">   <div class="val" id="s-otro">—</div> <div class="lbl">Different coach</div></div>
  <div class="summary-divider"></div>
  <div class="stat rate">  <div class="val" id="s-rate">—</div> <div class="lbl">Match rate</div></div>
</div>

<div id="exec-summary"></div>

<!-- ── SESSIONS VIEW ── -->
<div id="sessions-view">
  <div class="container">
    <div class="table-wrap" id="term-table-wrap">
      <div class="empty">Loading…</div>
    </div>
  </div>
</div>

<!-- ── COACHES VIEW ── -->
<div id="coaches-view" style="display:none">
  <div class="container">
    <div class="table-wrap" id="coaches-table-wrap">
      <div class="empty">Loading…</div>
    </div>
  </div>
</div>

}

// ── TAB SWITCHING ────────────────────────────────────────────────────────────
function switchTab(tab) {
  document.getElementById('sessions-view').style.display = tab === 'sessions' ? '' : 'none';
  document.getElementById('coaches-view').style.display  = tab === 'coaches'  ? '' : 'none';
  document.querySelectorAll('.tab-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.tab === tab)
  );

// ── COMMENTS CONFIG ───────────────────────────────────────────────────────────
const HARDCODED_GAS_URL = "https://script.google.com/macros/s/AKfycbxgutR_S63QtgwQlajz1CKtdKWlKLbF_21-3fxjXU6jdXC_OUkZ0QB2kwl4hODzRQwXgw/exec";

const getGasUrl = () =>
  HARDCODED_GAS_URL || localStorage.getItem("gas_url") || "";

// ── COMMENTS STATE ────────────────────────────────────────────────────────────
let comments = {};

async function loadComments() {
  const url = getGasUrl();
  if (url) {
    try {
      const r = await fetch(url, { redirect: "follow" });
      if (r.ok) {
        const data = await r.json();
        comments = data || {};
        localStorage.setItem("comments_local", JSON.stringify(comments));
        return;
      }
    } catch(e) { console.warn("Google Sheets comments read failed:", e.message); }
  }
  try { comments = JSON.parse(localStorage.getItem("comments_local") || "{}"); } catch(e) {}
}

async function saveComment(teamKey, text) {
  if (text === (comments[teamKey] || "")) return;
  comments[teamKey] = text;
  localStorage.setItem("comments_local", JSON.stringify(comments));

  const url = getGasUrl();
  if (!url) return;

  fetch(url, {
    method:  "POST",
    mode:    "no-cors",
    headers: { "Content-Type": "application/x-www-form-urlencoded" },
    body:    new URLSearchParams({ team: teamKey, comment: text }).toString(),
  }).catch(() => {});
}

function fillCommentCells() {
  const configured = getGasUrl() !== "";
  document.querySelectorAll(".comment-cell[data-team]").forEach(el => {
    el.value       = comments[el.dataset.team] || "";
    el.disabled    = false;
    el.placeholder = configured ? "Add a comment…" : "Add a comment… (local only — configure ⚙ to share)";
  });
}

// ── HELPERS ───────────────────────────────────────────────────────────────────
function show(id, msg) {
  const el = document.getElementById(id);
  if (el) { el.textContent = msg; el.style.display = "block"; }
}

function toggle(cid, catRow) {
  const rows = document.querySelectorAll(`tr.${cid}`);
  const open = catRow.classList.contains("open");
  catRow.classList.toggle("open", !open);
  rows.forEach(r => r.classList.toggle("hidden", open));
}

// ── DATA LOADING ──────────────────────────────────────────────────────────────
async function loadTermsIndex() {
  try {
    const r = await fetch("data/terms_index.json");
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    return await r.json();
  } catch(e) {
    document.getElementById("term-table-wrap").innerHTML =
      `<div class="empty">No term data available. Run process.py to generate it.</div>`;
    return null;
  }
}

function buildTermNav(terms) {
  const nav = document.getElementById("term-nav");
  nav.innerHTML = terms.map(t =>
    `<button class="tab-btn term-btn" data-term="${t.id}" onclick="switchTerm('${t.id}')">${t.label}</button>`
  ).join("");
}

function pickDefaultTerm(terms) {
  const todayStr = new Date().toISOString().slice(0, 10);
  const current = terms.find(t => todayStr >= t.from && todayStr <= t.to);
  return (current || terms[terms.length - 1] || {}).id || null;
}

// ── TERM SWITCHING (lazy-loads data/<term>.json on first visit, then caches) ──
async function switchTerm(termId) {
  document.querySelectorAll(".term-btn").forEach(b =>
    b.classList.toggle("active", b.dataset.term === termId)
  );

  const entry = (window._termsIndex || []).find(t => t.id === termId);
  if (!entry) return;

  let data = window._termsData[termId];
  if (!data) {
    try {
      const r = await fetch("data/" + entry.file);
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      data = await r.json();
      window._termsData[termId] = data;
    } catch (e) {
      document.getElementById("term-table-wrap").innerHTML =
        `<div class="empty">No se pudo cargar ${entry.label}: ${e.message}</div>`;
      return;
    }
  }

  window._termData = data;   // kept as alias — sortCoachesBy() reads this directly
  ATT_START = data.term.att_start || data.term.from;
  coachSort = { col: null, dir: 1 };

  document.title = `Academy Coach Monitor — ${entry.label}`;
  document.getElementById("page-title").textContent = `Academy Coach Monitor — ${entry.label}`;

  renderTerm(data);
  renderCoaches(data);
  renderExecSummary(data);
}

// ── RENDER SESSIONS TAB ──────────────────────────────────────────────────────
function renderTerm(data) {
  if (!data) return;
  const dates = data.dates || [];

  let totA = 0, totO = 0;
  for (const cat of data.categories) {
    for (const s of cat.sessions) {
      totA += s.total_assigned   || 0;
      totO += (s.total_sessions - s.total_assigned) || 0;
    }
  }
  const tot = totA + totO;
  document.getElementById("s-total").textContent = tot;
  document.getElementById("s-asig").textContent  = totA;
  document.getElementById("s-otro").textContent  = totO;
  document.getElementById("s-rate").textContent  = tot > 0 ? (100 * totA / tot).toFixed(1) + "%" : "—";
  document.getElementById("date-range").textContent =
    `${data.term.from}  →  ${data.term.to}`;
  document.getElementById("gen-at").textContent =
    "Generated: " + new Date(data.generated_at).toLocaleString();

  const MONTH_ABBR = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const DAY_ABBR   = ['Su','Mo','Tu','We','Th','Fr','Sa'];

  const dtHdrs1 = dates.map(d => {
    const dt = new Date(d + 'T00:00:00Z');
    return `<th class="wk-hdr" style="min-width:40px;max-width:48px;padding:8px 4px;font-size:10px">${MONTH_ABBR[dt.getUTCMonth()]} ${dt.getUTCDate()}</th>`;
  }).join('');
  const dtHdrs2 = dates.map(d => {
    const dt = new Date(d + 'T00:00:00Z');
    return `<th style="font-size:9px;padding:2px 3px">${DAY_ABBR[dt.getUTCDay()]}</th>`;
  }).join('');

  const COLS = 2 + dates.length + 3;

  let html = `<table class="term-table">
    <thead>
      <tr>
        <th class="left" rowspan="2" style="min-width:220px;position:sticky;left:0;z-index:2;background:var(--slate)">Session / Team</th>
        <th class="left" rowspan="2" style="min-width:160px;position:sticky;left:220px;z-index:2;background:var(--slate)">Coach</th>
        <th rowspan="2" style="min-width:68px">Consistencia</th>
        <th rowspan="2" style="min-width:68px">Asistencia</th>
        <th class="left" rowspan="2" style="min-width:220px">Comments</th>
        ${dtHdrs1}
      </tr>
      <tr class="sub"><th></th><th></th><th></th>${dtHdrs2}</tr>
    </thead>
    <tbody>`;

  for (const cat of data.categories) {
    const cid      = `tc_${cat.name}`;
    const sessions = cat.sessions || [];
    const nSess    = sessions.length;

    // Category-level aggregated metrics
    let catAssigned = 0, catTotal = 0, catAtt = 0, catAttTotal = 0;
    for (const sess of sessions) {
      catAssigned += sess.total_assigned || 0;
      catTotal    += sess.total_sessions || 0;
      const ref = (sess.coaches || []).find(c => c.is_ref) || (sess.coaches || [])[0];
      if (ref && Array.isArray(ref.att_by_date)) {
        dates.forEach((d, di) => {
          if (d < ATT_START || (ref.by_date || [])[di] !== true) return;
          catAttTotal++;
          if (ref.att_by_date[di] === true) catAtt++;
        });
      }
    }
    const consPct   = catTotal    > 0 ? Math.round(100 * catAssigned / catTotal)    : 0;
    const catAttPct = catAttTotal > 0 ? Math.round(100 * catAtt      / catAttTotal) : 0;
    const consClass = consPct   >= 80 ? 'ok' : consPct   >= 50 ? 'mid' : 'bad';
    const attCls    = catAttPct >= 80 ? 'ok' : catAttPct >= 50 ? 'mid' : 'bad';

    html += `<tr class="cat" onclick="toggle('${cid}', this)">
      <td colspan="${COLS}" style="position:sticky;left:0;background:#eceff1">
        <i class="arrow">▶</i>
        ${cat.name}
        <span class="cat-badge gray">${nSess} equipos</span>
        <span class="cat-badge ${consClass}">Consist. ${consPct}%</span>
        <span class="cat-badge ${attCls}">Asist. ${catAttPct}%</span>
      </td>
    </tr>`;

    if (nSess === 0) {
      html += `<tr class="sess ${cid} hidden">
        <td colspan="${COLS}" style="text-align:center;color:#aaa;font-size:12px;padding:12px">
          No data for this term
        </td>
      </tr>`;
    }

    for (const sess of sessions) {
      const coaches  = sess.coaches || [];
      const nCoaches = Math.max(coaches.length, 1);
      const safeKey  = sess.team.replace(/"/g, "&quot;");
      const totSess  = sess.total_sessions || 0;

      if (coaches.length === 0) {
        const emptyCells = dates.map(() => `<td class="wk-cell empty">·</td>`).join("");
        html += `<tr class="sess team-first ${cid} hidden">
          <td class="name" style="position:sticky;left:0;background:var(--white)">${sess.team}</td>
          <td class="coach-cell" style="position:sticky;left:220px;background:var(--white)">—</td>
          <td class="num total-cell">—</td>
          <td class="num total-cell">—</td>
          <td class="comment-col">
            <textarea class="comment-cell" data-team="${safeKey}"
              placeholder="Add a comment…"
              onblur="saveComment(this.dataset.team, this.value)"
            ></textarea>
          </td>
          ${emptyCells}
        </tr>`;
        continue;
      }

      coaches.forEach((coach, ci) => {
        const isFirst = ci === 0;

        const coachLabel = coach.is_ref
          ? `<strong>${coach.coach_name}</strong>&nbsp;<span class="ref-badge">REF</span>`
          : coach.coach_name;

        const sessStatusKey   = COACH_STATUS[coach.coach_id];
        const sessStatusBadge = sessStatusKey
          ? `<span class="status-badge ${sessStatusKey === 'A' ? 'active' : 'former'}">${sessStatusKey}</span>`
          : '';

        const sessPhone = COACH_PHONES[coach.coach_id];
        const sessWaBtn = sessPhone
          ? `<a class="wa-btn" href="https://wa.me/${sessPhone}?text=${WA_MSG}" target="_blank" onclick="event.stopPropagation()">
               <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.127.558 4.126 1.533 5.859L0 24l6.335-1.51A11.933 11.933 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 21.818a9.818 9.818 0 01-5.006-1.369l-.36-.214-3.724.888.923-3.638-.235-.374A9.818 9.818 0 1112 21.818z"/></svg>
               WhatsApp
             </a>`
          : '';

        const byDate    = coach.by_date     || [];
        const attByDate = coach.att_by_date || [];
        const dateCells = dates.map((d, di) => {
          const val = byDate[di];
          if (val === null || val === undefined) return `<td class="wk-cell empty">·</td>`;
          const cls  = val ? "yes" : "no";
          const icon = val ? "✓" : "✗";
          const att  = attByDate[di];
          const bg   = att === true                    ? "background:#1b5e20"
                     : att === false && d >= ATT_START ? "background:#b71c1c"
                     : "";
          return `<td class="wk-cell" style="${bg}"><span class="tick-item ${cls}">${icon}</span></td>`;
        }).join("");

        const rate      = totSess > 0 ? Math.round(100 * coach.count / totSess) : 0;
        const rateClass = rate >= 80 ? "good" : rate >= 50 ? "mid" : "bad";

        const hasAtt = Array.isArray(coach.att_by_date);
        let attCount = 0, attTotSess = 0;
        if (hasAtt) {
          dates.forEach((d, di) => {
            if (d < ATT_START || byDate[di] !== true) return;
            attTotSess++;
            if (attByDate[di] === true) attCount++;
          });
        }
        const attPct   = attTotSess > 0 ? Math.round(100 * attCount / attTotSess) : 0;
        const attClass = attPct >= 80 ? "good" : (attCount === 0 && attTotSess > 0) ? "bad" : "mid";
        const attCell  = !hasAtt
          ? `<td class="num total-cell">—</td>`
          : attTotSess > 0
            ? `<td class="num total-cell ${attClass}">${attCount}/${attTotSess}<small>${attPct}%</small></td>`
            : `<td class="num total-cell">—</td>`;

        let row = `<tr class="sess${isFirst ? " team-first" : ""} ${cid} hidden">`;

        if (isFirst) {
          row += `<td class="name" rowspan="${nCoaches}" style="position:sticky;left:0;background:var(--white)">${sess.team}</td>`;
        }

        row += `<td class="coach-cell" style="position:sticky;left:220px;background:var(--white)">${coachLabel}${sessStatusBadge}${sessWaBtn}</td>`;
        row += `<td class="num total-cell ${rateClass}">${coach.count}/${totSess}<small>${rate}%</small></td>`;
        row += attCell;

        if (isFirst) {
          row += `<td class="comment-col" rowspan="${nCoaches}">
            <textarea class="comment-cell" data-team="${safeKey}"
              placeholder="Add a comment…"
              onblur="saveComment(this.dataset.team, this.value)"
            ></textarea>
          </td>`;
        }

        row += dateCells;
        row += `</tr>`;
        html += row;
      });
    }
  }

  html += "</tbody></table>";
  document.getElementById("term-table-wrap").innerHTML = html;
  fillCommentCells();
}

// ── RENDER COACHES TAB ────────────────────────────────────────────────────────
function renderCoaches(data) {
  const wrap = document.getElementById("coaches-table-wrap");

  if (!data || !Array.isArray(data.coaches) || !Array.isArray(data.dates) || !data.dates.length) {
    wrap.innerHTML = '<div class="empty">Coach-level data not available. Run enrich-attendance.mjs to generate it.</div>';
    return;
  }

  const dates   = data.dates;
  const coaches = data.coaches;

  // Pre-compute stats for sorting
  const _stats = new Map();
  coaches.forEach(coach => {
    const totalCount = coach.sessions.reduce((s,x) => s+(x.count||0), 0);
    const totalSess  = coach.sessions.reduce((s,x) => s+(x.total_sessions||0), 0);
    const consPct = totalSess > 0 ? Math.round(100*totalCount/totalSess) : 0;
    let attCount=0, attTotal=0;
    coach.sessions.forEach(sess => {
      dates.forEach((d,di) => {
        if (d < ATT_START || (sess.by_date||[])[di] !== true) return;
        attTotal++;
        if ((sess.att_by_date||[])[di] === true) attCount++;
      });
    });
    const attPct = attTotal > 0 ? Math.round(100*attCount/attTotal) : 0;
    _stats.set(coach.coach_id, { consPct, attPct });
  });

  const sortedCoaches = [...coaches].sort((a, b) => {
    if (!coachSort.col) return a.coach_name.localeCompare(b.coach_name);
    const sa = _stats.get(a.coach_id), sb = _stats.get(b.coach_id);
    if (coachSort.col === 'name') return coachSort.dir * a.coach_name.localeCompare(b.coach_name);
    if (coachSort.col === 'cons') return coachSort.dir * (sa.consPct - sb.consPct);
    if (coachSort.col === 'att')  return coachSort.dir * (sa.attPct  - sb.attPct);
    return 0;
  });

  const MONTH_ABBR = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const DAY_ABBR   = ['Su','Mo','Tu','We','Th','Fr','Sa'];

  // Date column headers (two rows: "May 2" / "Sa")
  const dtHdrs1 = dates.map(d => {
    const dt = new Date(d + 'T00:00:00Z');
    return `<th class="dt-hdr">${MONTH_ABBR[dt.getUTCMonth()]} ${dt.getUTCDate()}</th>`;
  }).join('');

  const dtHdrs2 = dates.map(d => {
    const dt = new Date(d + 'T00:00:00Z');
    return `<th style="font-size:9px;padding:2px 3px">${DAY_ABBR[dt.getUTCDay()]}</th>`;
  }).join('');

  const TOTAL_COLS = 1 + dates.length + 2;

  const sortInd = col => {
    if (coachSort.col !== col) return '<span style="opacity:.35;font-size:9px;margin-left:3px">⇅</span>';
    return coachSort.dir === 1
      ? '<span style="font-size:10px;margin-left:3px">▲</span>'
      : '<span style="font-size:10px;margin-left:3px">▼</span>';
  };
  const thStyle = 'cursor:pointer;user-select:none';
  const thStyle2 = thStyle + ';min-width:68px';

  let html = `<table class="coaches-table">
    <thead>
      <tr>
        <th class="left" rowspan="2" style="min-width:220px;position:sticky;left:0;z-index:2;background:var(--slate);${thStyle}" onclick="sortCoachesBy('name')">Coach / Team${sortInd('name')}</th>
        <th rowspan="2" style="${thStyle2}" onclick="sortCoachesBy('cons')">Consistencia${sortInd('cons')}</th>
        <th rowspan="2" style="${thStyle2}" onclick="sortCoachesBy('att')">Asistencia${sortInd('att')}</th>
        ${dtHdrs1}
      </tr>
      <tr class="sub"><th></th><th></th>${dtHdrs2}</tr>
    </thead>
    <tbody>`;

  sortedCoaches.forEach((coach, ci) => {
    const cid   = `cc_${ci}`;
    const nSess = coach.sessions.length;

    // Overall coach stats for badge
    const totalCount = coach.sessions.reduce((s, sess) => s + (sess.count || 0), 0);
    const totalSess  = coach.sessions.reduce((s, sess) => s + (sess.total_sessions || 0), 0);
    const consPct    = totalSess > 0 ? Math.round(100 * totalCount / totalSess) : 0;
    const consClass  = consPct >= 80 ? 'ok' : consPct >= 50 ? 'mid' : 'bad';

    // Att % from ATT_START across all sessions
    let coachAttCount = 0, coachAttTotal = 0;
    coach.sessions.forEach(sess => {
      dates.forEach((d, di) => {
        if (d < ATT_START || (sess.by_date || [])[di] !== true) return;
        coachAttTotal++;
        if ((sess.att_by_date || [])[di] === true) coachAttCount++;
      });
    });
    const attPct   = coachAttTotal > 0 ? Math.round(100 * coachAttCount / coachAttTotal) : 0;
    const attClass = attPct >= 80 ? 'ok' : (coachAttCount === 0 && coachAttTotal > 0) ? 'bad' : 'mid';

    const statusKey = COACH_STATUS[coach.coach_id];
    const statusBadge = statusKey
      ? `<span class="status-badge ${statusKey === 'A' ? 'active' : 'former'}">${statusKey === 'A' ? 'Active' : 'Former'}</span>`
      : '';

    const phone   = COACH_PHONES[coach.coach_id];
    const waBtn   = phone
      ? `<a class="wa-btn" href="https://wa.me/${phone}?text=${WA_MSG}" target="_blank" onclick="event.stopPropagation()">
           <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.127.558 4.126 1.533 5.859L0 24l6.335-1.51A11.933 11.933 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 21.818a9.818 9.818 0 01-5.006-1.369l-.36-.214-3.724.888.923-3.638-.235-.374A9.818 9.818 0 1112 21.818z"/></svg>
           WhatsApp
         </a>`
      : '';

    html += `<tr class="cat" onclick="toggle('${cid}', this)">
      <td colspan="${TOTAL_COLS}" style="position:sticky;left:0;background:#eceff1">
        <i class="arrow">▶</i>
        ${coach.coach_name}
        <span class="cat-badge gray">${nSess} team${nSess !== 1 ? 's' : ''}</span>
        <span class="cat-badge ${consClass}">Consist. ${consPct}%</span>
        <span class="cat-badge ${attClass}">Asist. ${attPct}%</span>
        ${statusBadge}${phone ? `<span style="font-size:11px;color:#546e7a;margin-right:4px;vertical-align:middle">+${phone}</span>` : ''}${waBtn}
      </td>
    </tr>
    <tr class="coach-comment-row">
      <td colspan="${TOTAL_COLS}">
        <textarea class="comment-cell" data-team="coach_${coach.coach_id}"
          placeholder="Add a comment…"
          onclick="event.stopPropagation()"
          onblur="saveComment(this.dataset.team, this.value)"
          rows="2"></textarea>
      </td>
    </tr>`;

    coach.sessions.forEach((sess, si) => {
      const totSess = sess.total_sessions || 0;

      // Date cells
      const dateCells = dates.map((d, di) => {
        const val = (sess.by_date || [])[di];
        if (val === null || val === undefined) {
          return `<td class="wk-cell empty">·</td>`;
        }
        const cls  = val ? 'yes' : 'no';
        const icon = val ? '✓' : '✗';
        const att  = (sess.att_by_date || [])[di];
        const bg   = att === true                    ? 'background:#1b5e20'
                   : att === false && d >= ATT_START ? 'background:#b71c1c'
                   : '';
        return `<td class="wk-cell" style="${bg}"><span class="tick-item ${cls}">${icon}</span></td>`;
      }).join('');

      const teamLabel = sess.is_ref
        ? `${sess.team}&nbsp;<span class="ref-badge">REF</span>`
        : sess.team;

      const count     = sess.count || 0;
      const rate      = totSess > 0 ? Math.round(100 * count / totSess) : 0;
      const rateClass = rate >= 80 ? 'good' : rate >= 50 ? 'mid' : 'bad';

      // Att from May 4 onwards: count sessions where coach was present, and how many submitted
      const hasAtt = Array.isArray(sess.att_by_date) && Array.isArray(sess.by_date);
      let attCount = 0, attTotSess = 0;
      if (hasAtt) {
        dates.forEach((d, di) => {
          if (d < ATT_START || (sess.by_date || [])[di] !== true) return;
          attTotSess++;
          if ((sess.att_by_date || [])[di] === true) attCount++;
        });
      }
      const attPct   = attTotSess > 0 ? Math.round(100 * attCount / attTotSess) : 0;
      const attClass = attPct >= 80 ? 'good' : (attCount === 0 && attTotSess > 0) ? 'bad' : 'mid';
      const attCell  = !hasAtt
        ? `<td class="num total-cell">—</td>`
        : attTotSess > 0
          ? `<td class="num total-cell ${attClass}">${attCount}/${attTotSess}<small>${attPct}%</small></td>`
          : `<td class="num total-cell">—</td>`;

      html += `<tr class="sess${si === 0 ? ' team-first' : ''} ${cid} hidden">
        <td class="team-cell" style="position:sticky;left:0;background:var(--white)">${teamLabel}</td>
        <td class="num total-cell ${rateClass}">${count}/${totSess}<small>${rate}%</small></td>
        ${attCell}
        ${dateCells}
      </tr>`;
    });
  });

  html += '</tbody></table>';
  wrap.innerHTML = html;
  fillCommentCells();
}

// ── EXECUTIVE SUMMARY ────────────────────────────────────────────────────────
function toggleExec() {
  const body   = document.getElementById('exec-body');
  const toggle = document.getElementById('exec-toggle');
  const header = document.getElementById('exec-header');
  const isHidden = body.classList.toggle('hidden');
  header.classList.toggle('open', !isHidden);
  toggle.textContent = isHidden ? 'mostrar ▼' : 'colapsar ▲';
}

function renderExecSummary(data) {
  const el = document.getElementById('exec-summary');
  if (!data || !el) return;
  const dates = data.dates || [];

  // Session stats: ref coach consistency + att
  const sessStats = [];
  for (const cat of (data.categories || [])) {
    for (const sess of (cat.sessions || [])) {
      const total = sess.total_sessions || 0;
      if (total < 3) continue;
      const ref = (sess.coaches || []).find(c => c.is_ref);
      if (!ref) continue;
      const consPct = Math.round(100 * (ref.count || 0) / total);
      let attCount = 0, attTotal = 0;
      if (Array.isArray(ref.att_by_date)) {
        dates.forEach((d, di) => {
          if (d < ATT_START || (ref.by_date || [])[di] !== true) return;
          attTotal++;
          if (ref.att_by_date[di] === true) attCount++;
        });
      }
      sessStats.push({ team: sess.team, refName: ref.coach_name, total, count: ref.count || 0, consPct, attCount, attTotal });
    }
  }

  // Coach stats: overall consistency + att
  const coachStats = [];
  for (const coach of (data.coaches || [])) {
    const totalCount = coach.sessions.reduce((s, x) => s + (x.count || 0), 0);
    const totalSess  = coach.sessions.reduce((s, x) => s + (x.total_sessions || 0), 0);
    if (totalSess < 3) continue;
    const consPct = Math.round(100 * totalCount / totalSess);
    let attCount = 0, attTotal = 0;
    for (const sess of coach.sessions) {
      dates.forEach((d, di) => {
        if (d < ATT_START || (sess.by_date || [])[di] !== true) return;
        attTotal++;
        if ((sess.att_by_date || [])[di] === true) attCount++;
      });
    }
    coachStats.push({ name: coach.coach_name, nTeams: coach.sessions.length, totalSess, consPct, attCount, attTotal, attPct: attTotal > 0 ? Math.round(100 * attCount / attTotal) : null });
  }

  const topSess    = [...sessStats].sort((a,b) => b.consPct - a.consPct).slice(0, 6);
  const lowSess    = [...sessStats].sort((a,b) => a.consPct - b.consPct).slice(0, 6);
  const topCoaches = [...coachStats].sort((a,b) => b.consPct - a.consPct).slice(0, 6);
  const lowAtt     = [...coachStats].filter(c => c.attTotal >= 3 && c.attPct !== null).sort((a,b) => a.attPct - b.attPct).slice(0, 6);

  const shortTeam = n => n.replace(/^ACADEMY\s+/i,'').replace(/^SELECT\s+/i,'').replace(/^GK\s+/i,'');
  const pctCls = p => p >= 80 ? 'ok' : p >= 50 ? 'mid' : 'bad';
  const mkItem = (name, sub, pct) =>
    `<div class="exec-item">
      <div class="exec-item-info">
        <div class="exec-item-name" title="${name}">${name}</div>
        <div class="exec-item-sub">${sub}</div>
      </div>
      <span class="exec-pct ${pctCls(pct)}">${pct}%</span>
    </div>`;
  const empty = msg => `<div class="exec-empty">${msg}</div>`;

  const cards = [
    { cls:'ok',    title:'▲ Sesiones — Mejor Consistencia',
      body: topSess.length ? topSess.map(s => mkItem(shortTeam(s.team), `${s.refName} · ${s.count}/${s.total} sesiones`, s.consPct)).join('') : empty('Sin datos') },
    { cls:'warn',  title:'▼ Sesiones — Peor Consistencia',
      body: lowSess.length ? lowSess.map(s => mkItem(shortTeam(s.team), `${s.refName} · ${s.count}/${s.total} sesiones`, s.consPct)).join('') : empty('Todas OK') },
    { cls:'navy',  title:'▲ Coaches — Mejor Consistencia',
      body: topCoaches.length ? topCoaches.map(c => mkItem(c.name, `${c.nTeams} equipo${c.nTeams!==1?'s':''} · ${c.totalSess} sesiones`, c.consPct)).join('') : empty('Sin datos') },
    { cls:'amber', title:'▼ Coaches — Peor Asistencia',
      body: lowAtt.length ? lowAtt.map(c => mkItem(c.name, `${c.attCount}/${c.attTotal} desde May 4`, c.attPct)).join('') : empty('Sin datos') },
  ];

  el.innerHTML = `
    <div class="exec-header open" id="exec-header" onclick="toggleExec()">
      <span class="exec-title">Resumen Ejecutivo</span>
      <span class="exec-toggle" id="exec-toggle">colapsar ▲</span>
    </div>
    <div class="exec-body" id="exec-body">
      ${cards.map(c => `<div class="exec-card"><div class="exec-card-title ${c.cls}">${c.title}</div>${c.body}</div>`).join('')}
    </div>`;
}

// ── BOOT ─────────────────────────────────────────────────────────────────────
Promise.all([loadTermsIndex(), loadComments()])
  .then(([terms]) => {
    if (terms && terms.length) {
      window._termsIndex = terms;
      window._termsData  = {};
      buildTermNav(terms);
      const defaultId = pickDefaultTerm(terms);
      if (defaultId) switchTerm(defaultId);
    }
  })
  .catch(err => {
    show("error-banner", "Dashboard error: " + err.message);
    console.error(err);
  });
</script>
